<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sweet Lab Photobooth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SCREEN 1 -->
<div id="startScreen" class="screen active">
  <div class="card">
    <h2>🍰 The Sweet Lab</h2>
    <p>
      Gratis photobooth dengan pembelian min Rp50.000<br><br>
      Waktu sesi: 5 menit
    </p>
    <button onclick="goInstruction()">Mulai</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="instructionScreen" class="screen">
  <div class="card">
    <h2>Petunjuk</h2>
    <p>
      • Ambil 3 foto<br>
      • Bisa coba lagi 2x<br>
      • Cetak hanya 1x
    </p>
    <p><b>Apa kamu sudah siap?</b></p>
    <button onclick="startSession()">Mulai Foto</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="cameraScreen" class="screen">

  <div id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <div id="countdown"></div>
  </div>

  <div id="controls">
    <button onclick="startCapture()">📸 Ambil Foto</button>
    <button onclick="retake()">🔁 Coba Lagi</button>
    <button onclick="printStrip()">🖨 Cetak</button>
    <button onclick="stopSession()">⛔ Berhenti</button>
  </div>

  <div id="strip"></div>

</div>

<script src="app.js"></script>

</body>
</html>
