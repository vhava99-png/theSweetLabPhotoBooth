<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sweet Lab Photobooth</title>
<link rel="stylesheet" href="style.css?v=5">
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen active">
  <h2>🍰 The Sweet Lab</h2>
  <button onclick="goInstruction()">Mulai</button>
</div>

<!-- INSTRUCTION -->
<div id="instructionScreen" class="screen">
  <h2>Petunjuk</h2>
  <p>3 foto • Coba lagi 2x • Cetak 1x</p>
  <button onclick="startSession()">Mulai Foto</button>
</div>

<!-- CAMERA -->
<div id="cameraScreen" class="screen">

<h2>📸 The Sweet Lab Photobooth</h2>

<div id="main">

<div id="cameraBlock">

<div id="cameraContainer">
<video id="video" autoplay playsinline></video>
<div id="countdown"></div>
</div>

<div id="controls">

<button class="retakeBtn" onclick="retake()" id="retakeBtn">🔁 Coba Lagi (2)</button>
<button class="printBtn" onclick="printStrip()">🖨 Cetak</button>
<button onclick="stopSession()">⛔ Berhenti</button>
</div>

</div>

<div id="strip">

<div class="receiptHeader">
-----------------------------<br>
<b>THE SWEET LAB</b><br><br>
Date/Time: <span id="datetime"></span><br><br>
</div>

<div id="photos"></div>

<div class="receiptFooter">
<br>-----------------------------<br>
<b id="randomCaption"></b><br><br>
<b id="randomCaption"></b><br><br>
Total: GOOD DAY<br><br>
@thesweetlab<br>
-----------------------------
</div>

</div>

</div>

</div>

<script src="app.js?v=5"></script>
</body>
</html>
